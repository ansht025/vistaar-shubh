services:
  # 1. FastAPI Python Backend Web Service
  - type: web
    name: vistaarwater-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # Must be supplied by user in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: vistaarwater-db
          property: connectionString

  # 2. Next.js Studio Web Service
  - type: web
    name: vistaarwater-studio
    runtime: node
    rootDir: studio-next
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: vistaarwater-backend
          type: web
          property: host

  # 3. Static Site Vite Frontend
  - type: static
    name: vistaarwater-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_ORIGIN
        fromService:
          name: vistaarwater-backend
          type: web
          property: host
      - key: VITE_STUDIO_DASHBOARD_URL
        fromService:
          name: vistaarwater-studio
          type: web
          property: host

databases:
  # Free PostgreSQL database (90-day free tier)
  - name: vistaarwater-db
    plan: free
